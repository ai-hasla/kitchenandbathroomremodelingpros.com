<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2B4B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#142038;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8973E;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#C8973E;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#C8973E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8973E;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="100" y1="0" x2="100" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="500" y1="0" x2="500" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="700" y1="0" x2="700" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#fff" stroke-width="1" />
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1" />
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#C8973E" />

  <!-- House/Home icon -->
  <g transform="translate(600, 170)" fill="none" stroke="#C8973E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof -->
    <path d="M-50 10 L0 -35 L50 10" />
    <!-- House body -->
    <rect x="-40" y="10" width="80" height="55" rx="2" />
    <!-- Door -->
    <rect x="-12" y="30" width="24" height="35" rx="2" />
    <!-- Door handle -->
    <circle cx="8" cy="50" r="2" fill="#C8973E" />
    <!-- Left window -->
    <rect x="-34" y="22" width="16" height="14" rx="1" />
    <!-- Right window -->
    <rect x="18" y="22" width="16" height="14" rx="1" />
    <!-- Window crosses -->
    <line x1="-26" y1="22" x2="-26" y2="36" />
    <line x1="-34" y1="29" x2="-18" y2="29" />
    <line x1="26" y1="22" x2="26" y2="36" />
    <line x1="18" y1="29" x2="34" y2="29" />
    <!-- Chimney -->
    <rect x="20" y="-20" width="14" height="25" rx="1" />
  </g>

  <!-- KB Logo badge -->
  <g transform="translate(600, 260)">
    <rect x="-28" y="-18" width="56" height="36" rx="8" fill="#C8973E" />
    <text x="0" y="6" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">KB</text>
  </g>

  <!-- Decorative line -->
  <rect x="350" y="300" width="500" height="2" rx="1" fill="url(#accentLine)" />

  <!-- Company Name -->
  <text x="600" y="350" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">Kitchen &amp; Bathroom</text>
  <text x="600" y="405" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">Remodeling Pros</text>

  <!-- Decorative line -->
  <rect x="400" y="425" width="400" height="1.5" rx="1" fill="url(#accentLine)" />

  <!-- Location -->
  <g transform="translate(600, 465)">
    <!-- Map pin icon -->
    <g transform="translate(-80, -12)" fill="#C8973E">
      <path d="M8 0C4.5 0 1.5 3 1.5 6.5C1.5 11.5 8 18 8 18S14.5 11.5 14.5 6.5C14.5 3 11.5 0 8 0ZM8 9C6.6 9 5.5 7.9 5.5 6.5S6.6 4 8 4S10.5 5.1 10.5 6.5S9.4 9 8 9Z" />
    </g>
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#C8973E" text-anchor="middle" letter-spacing="3">Seattle, WA</text>
  </g>

  <!-- Phone number -->
  <g transform="translate(600, 520)">
    <!-- Phone icon -->
    <g transform="translate(-100, -14)" fill="#ffffff" opacity="0.7">
      <path d="M4 2C2.9 2 2 2.9 2 4C2 13.4 9.6 21 19 21C20.1 21 21 20.1 21 19V16.5C21 15.7 20.5 15 19.8 14.7L16.5 13.4C15.8 13.1 15 13.3 14.5 13.9L13.2 15.4C10.4 14 8 11.6 6.6 8.8L8.1 7.5C8.7 7 8.9 6.2 8.6 5.5L7.3 2.2C7 1.5 6.3 1 5.5 1H4Z" transform="scale(0.75)" />
    </g>
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" opacity="0.7" letter-spacing="2">(206) 555-0123</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="#C8973E" />

  <!-- Corner accents -->
  <g stroke="#C8973E" stroke-width="2" fill="none" opacity="0.3">
    <path d="M30 30 L30 60" />
    <path d="M30 30 L60 30" />
    <path d="M1170 30 L1170 60" />
    <path d="M1170 30 L1140 30" />
    <path d="M30 595 L30 565" />
    <path d="M30 595 L60 595" />
    <path d="M1170 595 L1170 565" />
    <path d="M1170 595 L1140 595" />
  </g>
</svg>
